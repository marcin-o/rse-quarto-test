name: test

on:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v6
      - uses: quarto-dev/quarto-actions/setup@v2
      - uses: quarto-dev/quarto-actions/render@v2

      - uses: actions/upload-artifact@v7
        with:
          path: ./project.html
